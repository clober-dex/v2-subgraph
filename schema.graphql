# Data accumulated and condensed into day stats for all of Clober
type CloberDayData @entity(immutable: false) {
  # timestamp rounded to current day by dividing by 86400
  id: ID!
  # timestamp rounded to current day by dividing by 86400
  date: Int!

  # derived fields
  contractInteractionDayData: [ContractInteractionDayData!]! @derivedFrom(field: "cloberDayData")
}

type ContractInteractionDayData @entity(immutable: false) {
  # `${contractAddress}-{periodStartUnix}`
  id: ID!
  # timestamp rounded to current day by dividing by 86400
  date: Int!
  # pointer to clober day data
  cloberDayData: CloberDayData!
  # contract address
  contract: Bytes!
  # count of interactions
  callCount: BigInt!
  # accumulated volume in USD
  volumeUSD: BigDecimal!
}
