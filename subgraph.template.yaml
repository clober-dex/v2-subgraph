specVersion: 1.0.0
schema:
  file: ./schema.graphql
indexerHints:
  prune: auto
dataSources:
  - kind: ethereum
    name: BookManager
    network: {{ network }}
    source:
      abi: BookManager
      address: "{{ BookManager.address }}"
      startBlock: {{ BookManager.startBlock }}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - CloberDayData
        - ContractInteractionDayData
      abis:
        - name: BookManager
          file: ./abis/BookManager.json
      eventHandlers:
        - event: Take(indexed uint192,indexed address,int24,uint64)
          handler: handleTake
      file: ./src/mappings/core.ts
